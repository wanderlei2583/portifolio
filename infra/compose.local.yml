services:
  reverse-proxy:
    volumes:
      - ./nginx/reverse-proxy.local.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/local-certs:/etc/nginx/ssl:ro

  frontend:
    build:
      context: ..
      dockerfile: infra/docker/frontend.Dockerfile

  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
