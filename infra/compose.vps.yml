services:
  frontend:
    build:
      context: ..
      dockerfile: infra/docker/frontend.Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"

  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:8081:8080"
