services:
  reverse-proxy:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - frontend
      - backend
      - certbot

  frontend:
    image: ghcr.io/appuser/wrtoriama-frontend:latest
    restart: always

  backend:
    image: ghcr.io/appuser/wrtoriama-backend:latest
    restart: always
    env_file:
      - ../.env

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: ["sleep", "infinity"]

volumes:
  certbot-etc:
  certbot-www:
