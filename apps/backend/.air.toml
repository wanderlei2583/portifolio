root = "."
tmp_dir = "tmp"

[build]
  # Comando para compilar a cada alteração
  cmd = "go build -o ./tmp/main ./cmd/api/main.go"
  # Onde o binário compilado fica
  bin = "./tmp/main"
  # Se o build falhar, deve parar?
  stop_on_error = true
  # Extensões para monitorizar
  include_ext = ["go", "tpl", "tmpl", "html"]
  # Ficheiros/Pastas para ignorar
  exclude_dir = ["assets", "tmp", "vendor", "bin", "frontend"]

[log]
  # Cores no terminal para facilitar leitura
  main_only = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  # Limpa o ecrã ao reiniciar
  clean_on_exit = true
